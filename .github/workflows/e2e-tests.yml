name: E2E Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_module:
        description: 'Test module to run (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - cpt-codes
          - patients
          - login
          - dashboard
          - scheduling
          - encounters
          - tasks
          - billing
          - triage
          - settings

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run all E2E tests
        if: ${{ github.event.inputs.test_module == '' || github.event.inputs.test_module == null }}
        run: npx playwright test --project=chromium

      - name: Run specific module tests
        if: ${{ github.event.inputs.test_module != '' && github.event.inputs.test_module != null }}
        run: npx playwright test tests/e2e/${{ github.event.inputs.test_module }}.spec.js --project=chromium

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
